    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFCFB;
            color: #444444;
        }
        /* 導航欄標籤 */
        .nav-tab {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            color: #71717a;
        }
        .nav-tab.active {
            border-bottom-color: #FDA4AF;
            color: #E11D48;
            font-weight: 700;
        }
        /* 時間軸圖標懸停效果 */
        .timeline-item .icon {
            transition: transform 0.3s ease;
            border: 1px solid #FFE4E6;
        }
        .timeline-item:hover .icon {
            transform: scale(1.15);
            background-color: #FFF1F2;
        }
        /* 連結卡片樣式 */
        .link-card {
            transition: all 0.3s ease;
            border: 1px solid #F4F4F5;
        }
        .link-card:hover {
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.08);
            background-color: #FFFFFF;
            border-color: #FECDD3;
        }
        /* 確保小螢幕上標籤可捲動 */
        .nav-scroll-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }
        /* 表格樣式優化 */
        table td, table th {
            border-color: #FFE4E6 !important;
        }
    </style>
</head>

            const data = tripData.links;
            const groupedLinks = data.locations.reduce((acc, link) => {

                acc[link.category].push(link);
                return acc;
            }, {});

                const linkCards = groupedLinks[category].map(link => `

                       class="flex flex-col items-center justify-center p-4 bg-white border border-stone-100 rounded-lg shadow-sm hover:shadow-md hover:bg-rose-50 transition duration-300 transform hover:scale-[1.02] cursor-pointer text-center h-full text-stone-700">

                        <p class="font-bold text-base">${link.name}</p>
                        <span class="text-xs text-rose-400 mt-1 font-medium">查看詳情 ↗</span>
                    </a>
                `).join('');

                return `
                    <section class="mb-10 animate-fadeIn">
                        <h3 class="text-xl font-bold text-rose-500 border-b-2 border-rose-100 pb-1 mb-5">${category}</h3>
                        <div class="grid grid-cols-2 gap-4 sm:grid-cols-3 lg:grid-cols-4">

                    </section>
                `;
            }).join('');

                        ${sectionsHtml}
                    </div>

            `;

            const data = tripData[day];
            if (!data) return;

            const eventsHtml = data.events.map((event, index) => {
                const isLinkable = !!event.url; 
                
                const elementTag = isLinkable ? 'a' : 'div';
                const linkAttributes = isLinkable ? `href="${event.url}" target="_blank" rel="noopener noreferrer"` : '';
                const cursorClass = isLinkable ? 'link-card transition duration-300' : '';

                return `
                    <div class="timeline-item flex items-start space-x-5">
                        <div class="flex flex-col items-center">
                            <div class="icon w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center text-xl sm:text-2xl shadow-sm border-2 border-rose-100">${event.icon}</div>

                            <${elementTag} class="block bg-white p-5 sm:p-6 rounded-xl shadow-sm border border-stone-100 ${cursorClass}" ${linkAttributes}>
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-xs sm:text-sm font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded">${event.time}</span>
                                    ${isLinkable ? '<span class="text-[11px] font-bold text-rose-500 underline decoration-rose-200">🔗 查看地圖</span>' : ''}
                                </div>
                                <h4 class="text-lg sm:text-xl font-bold text-stone-800 mb-2">${event.title}</h4>
                                <p class="text-sm text-stone-600 leading-relaxed">${event.description}</p>
                            </${elementTag}>
                        </div>
                    </div>
                `;
            }).join('');

            contentContainer.innerHTML = `
                <div id="${day}" class="tab-content animate-fadeIn">
                     <section class="bg-white p-6 sm:p-8 rounded-xl shadow-sm mb-8 text-center border border-rose-50">
                        <h2 class="text-2xl font-bold text-rose-600">${data.title}</h2>
                    </section>
                    <div class="timeline-container max-w-2xl mx-auto">
                        ${eventsHtml}
                    </div>
                </div>
            `;
        };
        
        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                if (tabName === 'links') {
                    renderLinks();
                } else {
                    renderTimeline(tabName);
                }
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderLinks();
        });
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
</html>
