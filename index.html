    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #FDFCFB;
            color: #444444;
        }
        /* 導航欄標籤 */
        .nav-tab {
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
            color: #71717a;
        }
        .nav-tab.active {
            border-bottom-color: #FDA4AF;
            color: #E11D48;
            font-weight: 700;
        }
        /* 時間軸圖標懸停效果 */
        .timeline-item .icon {
            transition: transform 0.3s ease;
            border: 1px solid #FFE4E6;
        }
        .timeline-item:hover .icon {
            transform: scale(1.15);
            background-color: #FFF1F2;
        }
        /* 連結卡片樣式 */
        .link-card {
            transition: all 0.3s ease;
            border: 1px solid #F4F4F5;
        }
        .link-card:hover {
            box-shadow: 0 4px 15px rgba(225, 29, 72, 0.08);
            background-color: #FFFFFF;
            border-color: #FECDD3;
        }
        /* 確保小螢幕上標籤可捲動 */
        .nav-scroll-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .nav-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }
        /* 表格樣式優化 */
        table td, table th {
            border-color: #FFE4E6 !important;
        }
    </style>
</head>

        </header>

                `,

                title: "4/6 望遠市場與現代百貨",
                events: [
                    { time: "", icon: "🍱", title: "望遠市場", description: "深入在地市場，品嚐著名的高可露餅、炸雞丁與各種韓式小吃。" },
                    { time: "", icon: "🌸", title: "汝矣島 <span class='text-sm font-normal text-stone-500 ml-2'>賞櫻</span>", description: "漫步漢江邊的櫻花隧道，享受大片草坪與宜人的河風景色。" },
                    { time: "", icon: "🏢", title: "現代百貨 Seoul", description: "走訪全首爾最大的百貨，必看室內空中花園瀑布與各種潮流快閃店。" },
                    { time: "", icon: "🛍️", title: "弘大商圈", description: "回到弘大感受學生區的活力，逛逛選物店與看街頭表演。" },
                    { time: "19:00", icon: "🍖", title: "晚餐：GIT TTEUL 韓式烤肉", description: "<div class='flex justify-between items-center w-full'><span>享用道地的韓式烤肉與精緻配菜。</span><a href='https://maps.app.goo.gl/TkcqbyLidveT5BQP6' target='_blank' class='shrink-0 text-rose-400 underline font-bold whitespace-nowrap ml-2 text-xs sm:text-sm'>地圖連結 ↗</a></div>" }
                ]
            },
            day3: {
                title: "4/7 首爾林與聖水文化",
                events: [
                    { time: "", icon: "🌳", title: "首爾林 <span class='text-sm font-normal text-stone-500 ml-2'>賞櫻</span>", description: "在首爾林公園漫步，欣賞春季自然景觀，適合悠閒散步與拍照。" },

                    { time: "", icon: "🥘", title: "午餐：百年土種蔘雞湯", description: "<div class='flex justify-between items-center w-full'><span>品嚐道地的韓式人蔘雞湯。</span><a href='https://maps.app.goo.gl/1jRYYyxwkFqkGRX56' target='_blank' class='shrink-0 text-rose-400 underline font-bold whitespace-nowrap ml-2 text-xs sm:text-sm'>地圖連結 ↗</a></div>" },

                    { time: "", icon: "⛰️", title: "南山公園", description: "沿著城牆散步，在森林芬多精中感受首爾的城市之美。" }

                    { time: "10:45", icon: "🚇", title: "搭乘 AREX 普通車", description: "<div class='flex justify-between items-center w-full'><span>從弘大入口站搭乘機場快線前往仁川機場。</span><a href='https://www.airportrailroad.com/train/normal/info/030' target='_blank' class='shrink-0 text-rose-400 underline font-bold whitespace-nowrap ml-2 text-xs sm:text-sm'>AREX 時刻表 ↗</a></div>" },
                    { time: "14:45", icon: "🛫", title: "航班起飛", description: "帶著滿滿的回憶與戰利品告別首爾。" }
                ]
            }
        };

        const contentContainer = document.getElementById('content-container');
        const navTabs = document.querySelectorAll('.nav-tab');

        const renderLinks = () => {
            const data = tripData.links;
            contentContainer.innerHTML = `
                <div id="links" class="tab-content space-y-8 animate-fadeIn">
                    <header class="text-center bg-white p-6 sm:p-10 rounded-2xl shadow-sm border border-stone-100">
                        <div class="max-w-4xl mx-auto">
                            ${data.description}
                        </div>
                    </header>
                    <div class="space-y-4">
                    </div>
                </div>
            `;
        };

        const renderTimeline = (day) => {
            const data = tripData[day];
            if (!data) return;

            const eventsHtml = data.events.map((event, index) => {
                const isLinkable = !!event.url; 
                
                const elementTag = isLinkable ? 'a' : 'div';
                const linkAttributes = isLinkable ? `href="${event.url}" target="_blank" rel="noopener noreferrer"` : '';
                const cursorClass = isLinkable ? 'link-card transition duration-300' : '';

                return `
                    <div class="timeline-item flex items-start space-x-5">
                        <div class="flex flex-col items-center">
                            <div class="icon w-10 h-10 sm:w-12 sm:h-12 bg-white rounded-full flex items-center justify-center text-xl sm:text-2xl shadow-sm border-2 border-rose-100">${event.icon}</div>
                            ${index < data.events.length - 1 ? '<div class="w-0.5 h-20 sm:h-24 bg-rose-100/60"></div>' : ''}
                        </div>
                        <div class="flex-1 pb-10">
                            <${elementTag} class="block bg-white p-5 sm:p-6 rounded-xl shadow-sm border border-stone-100 ${cursorClass}" ${linkAttributes}>
                                <div class="flex justify-between items-center mb-2">
                                    ${event.time ? `<span class="text-xs sm:text-sm font-bold text-rose-500 bg-rose-50 px-2 py-1 rounded">${event.time}</span>` : '<span></span>'}
                                    ${isLinkable ? '<span class="text-[11px] font-bold text-rose-500 underline decoration-rose-200">🔗 查看地圖</span>' : ''}
                                </div>
                                <h4 class="text-lg sm:text-xl font-bold text-stone-800 mb-2">${event.title}</h4>
                                <div class="text-sm text-stone-600 leading-relaxed">${event.description}</div>
                            </${elementTag}>
                        </div>
                    </div>
                `;
            }).join('');

            contentContainer.innerHTML = `
                <div id="${day}" class="tab-content animate-fadeIn">
                     <section class="bg-white p-6 sm:p-8 rounded-xl shadow-sm mb-8 text-center border border-rose-50">
                        <h2 class="text-2xl font-bold text-rose-600">${data.title}</h2>
                    </section>
                    <div class="timeline-container max-w-2xl mx-auto">
                        ${eventsHtml}
                    </div>
                </div>
            `;
        };
        
        navTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                navTabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabName = tab.dataset.tab;
                if (tabName === 'links') {
                    renderLinks();
                } else {
                    renderTimeline(tabName);
                }
            });
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderLinks();
        });
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</body>
